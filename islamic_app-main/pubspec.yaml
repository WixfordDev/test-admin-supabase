name: deenhub
description: "DeenHub Application"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.1.3+15

environment:
  sdk: ">=3.10.0-0 <4.0.0"

dependencies:
  app_settings: ^6.1.1
  audio_session: ^0.2.2
  auto_size_text: ^3.0.0
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.4.0
  camera: ^0.11.1
  chewie: ^1.7.4
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.1.0
  disable_battery_optimization:
    git:
      url: https://github.com/pvsvamsi/Disable-Battery-Optimizations
      ref: 3bd744d03c416859bbaedecd61c1c11fc022ed75
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  dropdown_button2: ^3.0.0-beta.16
  easy_localization: ^3.0.7
  equatable: ^2.0.7
  firebase_analytics: ^12.0.0
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  firebase_messaging: ^16.0.0
  firebase_remote_config: ^6.0.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^19.0.0
  flutter_svg: ^2.0.10+1
  flutter_timezone: ^5.0.0
  freezed_annotation: ^3.1.0
  geocoding: ^4.0.0
  geolocator: ^14.0.0
  get_it: ^8.0.0
  go_router: ^16.0.0
  google_maps_flutter: ^2.7.0
  google_maps_webapi: ^0.0.24
  google_sign_in: ^7.1.0
  http: ^1.1.0
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+2
  in_app_purchase_storekit: ^0.4.1
  intl: any
  json_annotation: ^4.9.0
  just_audio: ^0.10.4
  keyboard_actions: ^4.2.1
  logger: ^2.6.0
  dart_openai:
    git:
      url: https://github.com/nafiskabbo/openai.git
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  qr_flutter: ^4.1.0
  scrollable_positioned_list: ^0.3.8
  share_plus: ^12.0.0
  shared_preferences: ^2.3.0
  sign_in_with_apple: ^7.0.1
  simple_gesture_detector: ^0.2.1
  sound_mode: ^3.0.0
  supabase_flutter: ^2.9.0
  syncfusion_flutter_gauges: ^31.1.19
  timezone: ^0.10.0
  url_launcher: ^6.3.0
  uuid: ^4.3.3
  vector_math: ^2.1.4
  video_player: ^2.8.2
  webview_flutter: ^4.8.0

dev_dependencies:
  build_runner: ^2.6.0
  custom_lint: ^0.8.0
  drift_dev: ^2.26.1
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.1.0
  json_serializable: ^6.10.0

dependency_overrides: null
# analyzer: ">=6.5.0 <7.0.0"
# web: ^1.0.0
flutter_gen:
  output: lib/config/gen/ # Optional (default: lib/gen/)
  line_length: 100 # Optional (default: 80)

  # Optional
  integrations:
    image: false
    flutter_svg: false
    rive: false
    lottie: false

  assets:
    enabled: true
    outputs:
      package_parameter_enabled: false
      style: camel-case
      class_name: Assets
    exclude: []

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/audio/
    - assets/audio/prayer_guide/
    - assets/images/
    - assets/json/
    - assets/logo/
    - assets/translations/
    # - assets/videos/
    - assets/data/
    # The 9 books
    - assets/data/the_9_books/
    - assets/data/the_9_books/bukhari/
    - assets/data/the_9_books/muslim/
    - assets/data/the_9_books/abudawud/
    - assets/data/the_9_books/tirmidhi/
    - assets/data/the_9_books/nasai/
    - assets/data/the_9_books/ibnmajah/
    - assets/data/the_9_books/malik/
    - assets/data/the_9_books/darimi/
    - assets/data/the_9_books/ahmed/
    # Other books
    - assets/data/other_books/
    - assets/data/other_books/riyad_assalihin/
    - assets/data/other_books/bulugh_almaram/
    - assets/data/other_books/aladab_almufrad/
    - assets/data/other_books/mishkat_almasabih/
    - assets/data/other_books/shamail_muhammadiyah/
    # Forties
    - assets/data/forties/
    - assets/data/forties/nawawi40/
    - assets/data/forties/qudsi40/
    - assets/data/forties/shahwaliullah40/
    # Metadata
    - assets/data/metadata/
    - assets/data/metadata/forties/
    - assets/data/metadata/other_books/
    - assets/data/metadata/the_9_books/
    # - assets/json/quran.json
    # - assets/json/duas.json
    # - assets/data/faqs.json

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
        - asset: assets/fonts/Amiri-Slanted.ttf
          style: italic
        - asset: assets/fonts/Amiri-BoldSlanted.ttf
          weight: 700
          style: italic

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/logo/app_logo.jpeg"
  min_sdk_android: 21
  remove_alpha_ios: true
